apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: backstage
  namespace: ${NAMESPACE}
spec:
  application:
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
    extraEnvs:
      secrets:
        - name: rhdh-secrets
    extraFiles:
      mountPath: /opt/app-root/src
      configMaps:
        - name: rbac-policy
          key: rbac-policy.csv
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    route:
      enabled: true
  database:
    enableLocalDb: true
  deployment:
    patch:
      spec:
        template:
          spec:
            containers:
              - command:
                  - adt
                  - server
                image: 'quay.io/atiouajn/ansible-dev-tools-rhel9:26.4.6-1779106965'
                imagePullPolicy: Always
                ports:
                  - containerPort: 8000
                    protocol: TCP
