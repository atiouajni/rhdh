apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: backstage
  namespace: ${NAMESPACE}
spec:
  application:
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
    extraEnvs:
      secrets:
        - name: rhdh-secrets
    extraFiles:
      mountPath: /opt/app-root/src
      configMaps:
        - name: rbac-policy
          key: rbac-policy.csv
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    route:
      enabled: true
  database:
    enableLocalDb: true
